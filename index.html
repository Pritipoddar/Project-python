<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Graphics Gallery</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.0/jquery.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/gh/skulpt/skulpt-dist@master/skulpt.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/gh/skulpt/skulpt-dist@master/skulpt-stdlib.js" type="text/javascript"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #121212;
        color: #ffffff;
        margin: 0;
        padding: 20px;
      }
      .button-container {
        margin-bottom: 20px;
      }
      button {
        background-color: #2da44e;
        color: white;
        border: none;
        padding: 10px 18px;
        margin: 5px;
        font-size: 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #2c974b;
      }
      #status {
        font-style: italic;
        color: #aaa;
        margin-bottom: 15px;
      }
      #canvas-container {
        width: 600px;
        height: 600px;
        margin: 0 auto;
        background-color: #000000;
        border: 2px solid #444;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }
      /* Force Skulpt generated canvas to fit 600x600 perfectly */
      #canvas-container canvas {
        width: 600px !important;
        height: 600px !important;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>

    <h2>Python Turtle Gallery</h2>
    <p>Click any button below to execute that script:</p>

    <div class="button-container">
      <button onclick="runTurtleScript('flower.py')">Run Flower</button>
      <button onclick="runTurtleScript('heart.py')">Run Heart</button>
      <button onclick="runTurtleScript('snake.py')">Run Snake</button>
      <button onclick="runTurtleScript('tree.py')">Run Tree</button>
    </div>

    <div id="status">Select a project to run...</div>
    <div id="canvas-container"></div>

    <script type="text/javascript">
      function outf(text) { console.log(text); }

      function builtinRead(x) {
        if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
          throw "File not found: '" + x + "'";
        return Sk.builtinFiles["files"][x];
      }

      async function runTurtleScript(fileName) {
        const container = document.getElementById("canvas-container");
        const status = document.getElementById("status");

        container.innerHTML = "";
        status.innerText = `Executing ${fileName}...`;

        try {
          // Add random parameter to bypass GitHub Pages browser caching completely
          const response = await fetch(`./${fileName}?t=` + Math.random());
          if (!response.ok) throw new Error("Could not find " + fileName);
          const code = await response.text();

          Sk.PreserveGlue = true;
          Sk.configure({ output: outf, read: builtinRead });
          
          // Force canvas size in Skulpt settings
          (Sk.TurtleGraphics || (Sk.TurtleGraphics = {})).target = 'canvas-container';
          Sk.TurtleGraphics.width = 600;
          Sk.TurtleGraphics.height = 600;

          Sk.misceval.asyncToPromise(function() {
            return Sk.importMainWithBody("<stdin>", false, code, true);
          }).then(
            function() { status.innerText = `${fileName} finished executing successfully!`; },
            function(err) { status.innerText = `Error: ${err.toString()}`; }
          );
        } catch (err) {
          status.innerText = `Error loading file: ${err.message}`;
        }
      }
    </script>
  </body>
</html>
