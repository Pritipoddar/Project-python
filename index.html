<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Turtle Projects</title>

    <!-- Skulpt Libraries for Turtle Graphics -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.0/jquery.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/gh/skulpt/skulpt-dist@master/skulpt.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/gh/skulpt/skulpt-dist@master/skulpt-stdlib.js" type="text/javascript"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
        background-color: #f4f6f9;
      }
      .button-container {
        margin-bottom: 20px;
      }
      button {
        background-color: #2da44e;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background-color: #2c974b;
      }
      /* Container for Turtle Canvas */
      #canvas-container {
        margin: 20px auto;
        width: 500px;
        height: 500px;
        border: 2px solid #ccc;
        border-radius: 8px;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      #status {
        font-style: italic;
        color: #555;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>

    <h1>Python Projects</h1>
    <p>Click any button below to execute that script:</p>

    <!-- Navigation Buttons -->
    <div class="button-container">
      <button onclick="runTurtleScript('flower.py')">Run Flower</button>
      <button onclick="runTurtleScript('heart.py')">Run Heart</button>
      <button onclick="runTurtleScript('snake.py')">Run Snake</button>
      <button onclick="runTurtleScript('tree.py')">Run Tree</button>
    </div>

    <div id="status">Select a project to view the graphics...</div>

    <!-- Screen where Turtle draws -->
    <div id="canvas-container"></div>

    <script type="text/javascript">
      function outf(text) {
        console.log(text);
      }

      function builtinRead(x) {
        if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
          throw "File not found: '" + x + "'";
        return Sk.builtinFiles["files"][x];
      }

      async function runTurtleScript(fileName) {
        const canvasContainer = document.getElementById("canvas-container");
        const status = document.getElementById("status");

        // Clear previous canvas
        canvasContainer.innerHTML = "";
        status.innerText = `Loading and rendering ${fileName}...`;

        try {
          // Fetch the python file
          const response = await fetch(`./${fileName}`);
          if (!response.ok) throw new Error("Could not find " + fileName);
          const code = await response.text();

          // Configure Skulpt Turtle Screen
          Sk.PreserveGlue = true;
          Sk.configure({
            output: outf,
            read: builtinRead
          });

          (Sk.TurtleGraphics || (Sk.TurtleGraphics = {})).target = 'canvas-container';

          // Run Python Code
          Sk.misceval.asyncToPromise(function() {
            return Sk.importMainWithBody("<stdin>", false, code, true);
          }).then(
            function() {
              status.innerText = `${fileName} finished executing successfully!`;
            },
            function(err) {
              status.innerText = `Error: ${err.toString()}`;
            }
          );
        } catch (err) {
          status.innerText = `Failed to load file: ${err.message}`;
        }
      }
    </script>

  </body>
</html>
